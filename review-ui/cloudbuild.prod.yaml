# Cloud Build pipeline for NudgeNest Review UI (React/Vite) — PRODUCTION
# Triggers on push to main branch when review-ui/** changes.
# Injects production env vars at build time, builds Docker image, deploys to Cloud Run.
steps:
    # -------------------- Inject env vars --------------------
    - name: 'ubuntu'
      id: 'create-env'
      entrypoint: 'bash'
      args:
        - '-c'
        - |
          cat <<EOF > /workspace/review-ui/.env
          VITE_APP_BACKEND_HOST=$$VITE_APP_BACKEND_HOST_PROD
          VITE_APP_SENTRY_FE_DSN=$$VITE_APP_SENTRY_FE_DSN
          VITE_COMMIT_SHA=$COMMIT_SHA
          EOF
      secretEnv:
        - 'VITE_APP_BACKEND_HOST_PROD'
        - 'VITE_APP_SENTRY_FE_DSN'

    # -------------------- Build --------------------
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - build
          - '--no-cache'
          - '--build-arg'
          - 'COMMIT_SHA=$COMMIT_SHA'
          - '-t'
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-review-ui-prod:$COMMIT_SHA'
          - .
          - '-f'
          - review-ui/Dockerfile
      secretEnv:
        - 'VITE_APP_BACKEND_HOST_PROD'
        - 'VITE_APP_SENTRY_FE_DSN'
      id: build
      waitFor: ['create-env']

    # -------------------- Push --------------------
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - push
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-review-ui-prod:$COMMIT_SHA'
      id: push
      waitFor: ['build']

    # -------------------- Deploy --------------------
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      entrypoint: gcloud
      args:
          - run
          - deploy
          - nudgenest-review-ui-prod
          - '--platform=managed'
          - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-review-ui-prod:$COMMIT_SHA'
          - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
          - '--region=$_DEPLOY_REGION'
          - '--allow-unauthenticated'
          - '--min-instances=1'
          - '--max-instances=5'
          - '--quiet'
      id: deploy
      entrypoint: gcloud
      waitFor: ['push']

images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-review-ui-prod:$COMMIT_SHA'

options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE

substitutions:
    _DEPLOY_REGION: europe-west1
    _PLATFORM: managed

tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-review-ui-prod

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_BACKEND_HOST_PROD/versions/latest'
          env: 'VITE_APP_BACKEND_HOST_PROD'
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_SENTRY_FE_DSN/versions/latest'
          env: 'VITE_APP_SENTRY_FE_DSN'
