# [START cloudbuild_quickstart_build]
steps:
    # entrypoint: bash so the shell expands $$SECRET_NAME into the actual secret value
    # before passing to docker build (docker args are not shell-expanded otherwise)
    - name: 'gcr.io/cloud-builders/docker'
      entrypoint: bash
      args:
          - '-c'
          - |
            docker build \
              --no-cache \
              --build-arg COMMIT_SHA=$COMMIT_SHA \
              --build-arg VITE_APP_BACKEND_HOST=$$VITE_APP_BACKEND_HOST_STAGING \
              --build-arg VITE_APP_SENTRY_FE_DSN=$$VITE_APP_SENTRY_FE_DSN \
              -t $LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA \
              -f review-ui/Dockerfile \
              .
      secretEnv:
        - 'VITE_APP_BACKEND_HOST_STAGING'
        - 'VITE_APP_SENTRY_FE_DSN'
      id: 'build'

    # step 3: Push to google repo
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - push
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
      id: 'push'
      waitFor: ['build']

    # step 4: Deploy to cloud run
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      args:
          - run
          - services
          - update
          - nudgenest-review-ui
          - '--platform=managed'
          - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
          - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS'
          - '--region=$_DEPLOY_REGION'
          - '--quiet'
      id: Deploy
      entrypoint: gcloud
      waitFor: ['push']
images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE
substitutions:
    _DEPLOY_REGION: europe-west1
    _GCR_HOSTNAME: eu.gcr.io
    _PLATFORM: managed
tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-fe-service

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_BACKEND_HOST_STAGING/versions/latest'
          env: 'VITE_APP_BACKEND_HOST_STAGING'
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_SENTRY_FE_DSN/versions/latest'
          env: 'VITE_APP_SENTRY_FE_DSN'
# [END cloudbuild_quickstart_build]
