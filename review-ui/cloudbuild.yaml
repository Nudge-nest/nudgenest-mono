# [START cloudbuild_quickstart_build]
steps:
  # Step 1: Generate .env in review-ui directory
    - name: 'ubuntu'
      id: 'create-env'
      entrypoint: 'bash'
      args:
        - '-c'
        - |
          cat <<EOF > /workspace/review-ui/.env
          VITE_APP_BACKEND_HOST=$$VITE_APP_BACKEND_HOST
          VITE_APP_SENTRY_FE_DSN=$$VITE_APP_SENTRY_FE_DSN
          VITE_COMMIT_SHA=$COMMIT_SHA
          EOF
      secretEnv: # Secrets are masked in logs
        - 'VITE_APP_BACKEND_HOST'
        - 'VITE_APP_SENTRY_FE_DSN'

    #  step 2: Build docker image from dockerfile in review-ui directory
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - build
          - '--no-cache'
          - '--build-arg'
          - 'COMMIT_SHA=$COMMIT_SHA'
          - '-t'
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
          - review-ui  # Build context is the review-ui directory
          - '-f'
          - review-ui/Dockerfile  # Path to Dockerfile from repo root
      secretEnv: # Make secrets available to this step
        - 'VITE_APP_BACKEND_HOST'
        - 'VITE_APP_SENTRY_FE_DSN'
      id: 'build'
      waitFor: ['create-env']

    # step 3: Push to google repo
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - push
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
      id: 'push'
      waitFor: ['build']

    # step 4: Deploy to cloud run
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      args:
          - run
          - services
          - update
          - nudgenest-review-ui
          - '--platform=managed'
          - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
          - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS'
          - '--region=$_DEPLOY_REGION'
          - '--quiet'
      id: Deploy
      entrypoint: gcloud
      waitFor: ['push']
images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-fe-service/nudgenest-fe-service:$COMMIT_SHA'
options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE
substitutions:
    _DEPLOY_REGION: europe-west1
    _GCR_HOSTNAME: eu.gcr.io
    _PLATFORM: managed
tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-fe-service

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_BACKEND_HOST/versions/2'
          env: 'VITE_APP_BACKEND_HOST'
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_SENTRY_FE_DSN/versions/latest'
          env: 'VITE_APP_SENTRY_FE_DSN'
# [END cloudbuild_quickstart_build]
