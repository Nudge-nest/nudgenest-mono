# Cloud Build pipeline for NudgeNest Landing Page (nginx static) — PRODUCTION
# Triggers on push to main branch when nudge-nest-landing/** changes.
# Injects production env vars at build time, builds Docker image, deploys to Cloud Run.
steps:
    # -------------------- Inject env vars --------------------
    - name: 'ubuntu'
      id: 'create-env'
      entrypoint: 'bash'
      args:
        - '-c'
        - |
          cat <<EOF > /workspace/nudge-nest-landing/.env
          VITE_APP_BACKEND_URL=$$VITE_APP_BACKEND_HOST_PROD
          VITE_APP_CONTACT_URL=${_CONTACT_URL}
          VITE_APP_SIGNUP_URL=${_SIGNUP_URL}
          VITE_APP_FEATURES_URL=${_FEATURES_URL}
          VITE_APP_REVIEW_UI_URL=$$VITE_APP_REVIEW_UI_URL_PROD
          VITE_APP_DEMO_MERCHANT_ID=$$VITE_APP_DEMO_MERCHANT_ID
          EOF
      secretEnv:
        - 'VITE_APP_BACKEND_HOST_PROD'
        - 'VITE_APP_REVIEW_UI_URL_PROD'
        - 'VITE_APP_DEMO_MERCHANT_ID'

    # -------------------- Build --------------------
    - name: 'gcr.io/cloud-builders/docker'
      id: 'build'
      args:
        - build
        - '--no-cache'
        - '-t'
        - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-landing-service/nudgenest-landing-prod:$COMMIT_SHA'
        - nudge-nest-landing
        - '-f'
        - nudge-nest-landing/Dockerfile
      waitFor: ['create-env']

    # -------------------- Push --------------------
    - name: 'gcr.io/cloud-builders/docker'
      id: 'push'
      args:
        - push
        - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-landing-service/nudgenest-landing-prod:$COMMIT_SHA'
      waitFor: ['build']

    # -------------------- Deploy --------------------
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      id: 'deploy'
      entrypoint: gcloud
      args:
        - run
        - deploy
        - nudgenest-landing-prod
        - '--platform=managed'
        - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-landing-service/nudgenest-landing-prod:$COMMIT_SHA'
        - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
        - '--region=$_DEPLOY_REGION'
        - '--allow-unauthenticated'
        - '--max-instances=3'
        - '--quiet'
      waitFor: ['push']

images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-landing-service/nudgenest-landing-prod:$COMMIT_SHA'

options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE

substitutions:
    _DEPLOY_REGION: europe-west1
    _PLATFORM: managed
    _CONTACT_URL: 'https://www.google.com/search?q=Nudge-nest'
    _SIGNUP_URL: 'https://docs.google.com/forms/d/e/1FAIpQLSdT-tPUX4C8AzsClyNjZtwbTlrvRM8ByYYdbHWTi7gEyiwLrg/viewform?usp=header'
    _FEATURES_URL: 'https://docs.google.com/forms/d/e/1FAIpQLSfAxwijQju0JaZNFU7OAobMZqERVIi_oGD03ZhyWhTkEPVyMg/viewform?usp=dialog'

tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-landing-prod

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_BACKEND_HOST_PROD/versions/latest'
          env: 'VITE_APP_BACKEND_HOST_PROD'
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_REVIEW_UI_URL_PROD/versions/latest'
          env: 'VITE_APP_REVIEW_UI_URL_PROD'
        - versionName: 'projects/$PROJECT_ID/secrets/VITE_APP_DEMO_MERCHANT_ID/versions/latest'
          env: 'VITE_APP_DEMO_MERCHANT_ID'
