# Production Shopify app configuration
# application_url must be updated to the final Cloud Run URL after first deploy,
# then run: shopify app deploy --config shopify.prod.app.toml

client_id = "4dfb6f6524790aac59ecfe8f2cf0dc7f"
application_url = "https://merchant.nudgenest.io"
embedded = true
name = "NudgeNest ‑ Product Reviews"
handle = "nudgenest"

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "https://api.nudgenest.io/api/v1/shopify-webhook"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions/update"

  # GDPR mandatory compliance webhooks — required for Shopify App Store submission.
  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "pubsub://nudgenest:nudgenest-compliance"

[access_scopes]
scopes = "read_products, read_orders, read_customers"

[auth]
redirect_urls = [
  "https://merchant.nudgenest.io/auth/callback",
  "https://merchant.nudgenest.io/auth/shopify/callback",
  "https://merchant.nudgenest.io/api/auth/callback"
]

[pos]
embedded = false

[build]
dev_store_url = "byteminds-test-nudge.myshopify.com"
automatically_update_urls_on_dev = false
