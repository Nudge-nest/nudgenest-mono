# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "17dd6639f0adf774c19762bfc1f17d24"
application_url = "https://nudgenest-shopify-1094805904049.europe-west1.run.app"
embedded = true
name = "NudgeNest ‑ Product Reviews"
handle = "nudgenest"

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "https://api-staging.nudgenest.io/api/v1/shopify-webhook"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions/update"

  # GDPR mandatory compliance webhooks — required for Shopify App Store submission.
  # Shopify publishes directly to this Pub/Sub topic; the backend complianceConsumer
  # plugin pulls and processes from nudgenest-compliance-pull subscription.
  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "pubsub://nudgenest:nudgenest-compliance"

[access_scopes]
# learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products, read_orders, read_customers"

[auth]
redirect_urls = [
  "https://nudgenest-shopify-1094805904049.europe-west1.run.app/auth/callback",
  "https://nudgenest-shopify-1094805904049.europe-west1.run.app/auth/shopify/callback",
  "https://nudgenest-shopify-1094805904049.europe-west1.run.app/api/auth/callback"
]

[pos]
embedded = false

[build]
dev_store_url = "byteminds-test-nudge.myshopify.com"
automatically_update_urls_on_dev = true
