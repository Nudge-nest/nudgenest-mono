name: Update Yarn Lock and Create PR

on:
    push:
        branches:
            - develop

permissions:
    contents: write
    pull-requests: write

jobs:
    update-test-and-pr:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0 # Fetch all history for all branches

            - uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: 'yarn'

            - name: Update yarn.lock
              run: yarn install

            - name: Lint files
              run: yarn format

            - name: Commit changes if any
              id: commit_changes
              run: |
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"

                  if git diff --quiet yarn.lock; then
                    echo "No changes to yarn.lock"
                    echo "changes=false" >> $GITHUB_OUTPUT
                  else
                    git add yarn.lock
                    git commit -m "chore: update yarn.lock [skip ci]"
                    git push
                    echo "changes=true" >> $GITHUB_OUTPUT
                  fi

            - name: Build project
              run: yarn build
              env:
                  NODE_ENV: test
                  DATABASE_URL: 'mongodb://test:test@localhost:27017/test'
                  RABBITMQ_URL: 'amqp://localhost'
                  RABBITMQ_URL_AWS: 'amqp://localhost' # Add this!
                  # Add any other environment variables your tests need
                  APP_AWS_BUCKET_NAME: 'test-bucket'
                  APP_AWS_REGION: 'us-east-1'
                  APP_AWS_ACCESS_KEY: 'test-key'
                  APP_AWS_SECRET_KEY: 'test-secret'
                  GOOGLE_APP_PASSWORD: 'testPass'

            - name: Run all tests
              run: yarn test
              env:
                  NODE_ENV: test
                  DATABASE_URL: 'mongodb://test:test@localhost:27017/test'
                  RABBITMQ_URL: 'amqp://localhost'

            - name: Create Pull Request to test branch
              if: success()
              run: |
                  # Check if PR already exists
                  PR_EXISTS=$(gh pr list --base test --head develop --json number --jq length)

                  if [ "$PR_EXISTS" -eq "0" ]; then
                    # Create new PR
                    gh pr create \
                      --base test \
                      --head develop \
                      --title "[Auto] Update from develop to test" \
                      --body "## Automated PR from develop to test

                      This PR was automatically created after:
                      - ✅ yarn.lock was updated (if needed)
                      - ✅ All tests passed

                      ### Changes
                      - Updated dependencies via yarn.lock
                      - Latest code from develop branch

                      ### Test Results
                      All tests passed successfully! ✅" \
                      --label "automated" \
                      --label "dependencies" \
                      --label "tested"
                  else
                    echo "PR already exists from develop to test"
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
