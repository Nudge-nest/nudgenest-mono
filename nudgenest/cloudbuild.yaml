# [START cloudbuild_quickstart_build]
steps:
    # -------------------- Build docker image from dockerfile in nudgenest directory ---------------------------------
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - build
          - '--no-cache'
          - '--build-arg'
          - 'COMMIT_SHA=$COMMIT_SHA'
          - '-t'
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
          - nudgenest  # Build context is the nudgenest directory
          - '-f'
          - nudgenest/Dockerfile  # Path to Dockerfile from repo root
      id: 'build'
      secretEnv:
          - 'DATABASE_URL'
          - 'RESEND_API_KEY'
          - 'RESEND_FROM_EMAIL'
          - 'SHOPIFY_API_SECRET'
          - 'NODE_ENV'
          - 'GOOGLE_CLOUD_PROJECT_ID'
          - 'GCS_BUCKET_NAME'
          - 'REVIEW_UI_BASE_URL'
          - 'SENTRY_BACKEND_DSN'
          - 'ANTHROPIC_API_KEY'

    # -------------------- Push to google repo ---------------------------------
    - name: gcr.io/cloud-builders/docker
      args:
          - push
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
      id: 'push'

    # -------------------- Deploy ---------------------------------
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      args:
          - run
          - services
          - update
          - nudgenest-backend
          - '--platform=managed'
          - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
          - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS'
          - '--region=$_DEPLOY_REGION'
          - '--quiet'
          - '--set-secrets'
          - 'DATABASE_URL=projects/1094805904049/secrets/DATABASE_URL:latest,RESEND_API_KEY=projects/1094805904049/secrets/RESEND_API_KEY:latest,RESEND_FROM_EMAIL=projects/1094805904049/secrets/RESEND_FROM_EMAIL:latest,SHOPIFY_API_SECRET=projects/1094805904049/secrets/SHOPIFY_API_SECRET:latest,NODE_ENV=projects/1094805904049/secrets/NODE_ENV:latest,GOOGLE_CLOUD_PROJECT_ID=projects/1094805904049/secrets/GOOGLE_CLOUD_PROJECT_ID:latest,GCS_BUCKET_NAME=projects/1094805904049/secrets/GCS_BUCKET_NAME:latest,REVIEW_UI_BASE_URL=projects/1094805904049/secrets/REVIEW_UI_BASE_URL:latest,SENTRY_BACKEND_DSN=projects/1094805904049/secrets/SENTRY_BACKEND_DSN:latest,ANTHROPIC_API_KEY=projects/1094805904049/secrets/ANTHROPIC_API_KEY:latest'
      id: Deploy
      secretEnv:
          - 'DATABASE_URL'
          - 'RESEND_API_KEY'
          - 'SHOPIFY_API_SECRET'
          - 'NODE_ENV'
          - 'GOOGLE_CLOUD_PROJECT_ID'
          - 'GCS_BUCKET_NAME'
          - 'REVIEW_UI_BASE_URL'
          - 'SENTRY_BACKEND_DSN'
          - 'ANTHROPIC_API_KEY'
      entrypoint: gcloud
      waitFor: ['push']
images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE
substitutions:
    _DEPLOY_REGION: europe-west1
    _GCR_HOSTNAME: eu.gcr.io
    _PLATFORM: managed
tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-backend-service

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest'
          env: 'DATABASE_URL'
        - versionName: 'projects/$PROJECT_ID/secrets/RESEND_API_KEY/versions/latest'
          env: 'RESEND_API_KEY'
        - versionName: 'projects/$PROJECT_ID/secrets/RESEND_FROM_EMAIL/versions/latest'
          env: 'RESEND_FROM_EMAIL'
        - versionName: 'projects/$PROJECT_ID/secrets/SHOPIFY_API_SECRET/versions/latest'
          env: 'SHOPIFY_API_SECRET'
        - versionName: 'projects/$PROJECT_ID/secrets/NODE_ENV/versions/latest'
          env: 'NODE_ENV'
        - versionName: 'projects/$PROJECT_ID/secrets/GOOGLE_CLOUD_PROJECT_ID/versions/latest'
          env: 'GOOGLE_CLOUD_PROJECT_ID'
        - versionName: 'projects/$PROJECT_ID/secrets/GCS_BUCKET_NAME/versions/latest'
          env: 'GCS_BUCKET_NAME'
        - versionName: 'projects/$PROJECT_ID/secrets/REVIEW_UI_BASE_URL/versions/latest'
          env: 'REVIEW_UI_BASE_URL'
        - versionName: 'projects/$PROJECT_ID/secrets/SENTRY_BACKEND_DSN/versions/latest'
          env: 'SENTRY_BACKEND_DSN'
        - versionName: 'projects/$PROJECT_ID/secrets/ANTHROPIC_API_KEY/versions/latest'
          env: 'ANTHROPIC_API_KEY'
# [END cloudbuild_quickstart_build]
